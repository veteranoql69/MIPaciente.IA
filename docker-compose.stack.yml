version: "3.7"

services:
  urbamed-app:
    # Sustituir con la ruta real de tu imagen (ghcr.io/usuario/repo:latest)
    image: ghcr.io/${GITHUB_REPOSITORY_LOWERCASE:-tu-usuario/urbamed}:latest
    networks:
      - DesaNet

    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST}
      - STIRLING_PDF_URL=${STIRLING_PDF_URL}
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
          
      labels:
        - traefik.enable=true
        - traefik.http.routers.urbamed-app.rule=Host(`sdi.mipaciente.cl`)
        - traefik.http.routers.urbamed-app.entrypoints=websecure
        - traefik.http.routers.urbamed-app.priority=1
        - traefik.http.routers.urbamed-app.tls.certresolver=letsencryptresolver
        - traefik.http.routers.urbamed-app.service=urbamed-app
        - traefik.http.services.urbamed-app.loadbalancer.server.port=3000
        - traefik.http.services.urbamed-app.loadbalancer.passHostHeader=1

networks:
  DesaNet:
    external: true
    name: DesaNet
